<!-- COMPONENTE: MENUS OPERACIONAIS (ADMIN E MOTORISTA) -->
<section id="view-admin-hub" class="view-section">
  <div class="welcome-text" style="display: flex; justify-content: space-between; align-items: center;">
    <span>Bem-vindo, <span id="nome-operador-logado" style="color: var(--accent); font-weight: 700;">Operador</span></span>
    <button onclick="switchView('view-notificacoes'); abrirInbox();" style="background: none; border: none; font-size: 24px; cursor: pointer; position: relative;">
      🔔
      <span class="badge-notificacao" style="display: none; position: absolute; top: 0; right: -5px; width: 10px; height: 10px; background: red; border-radius: 50%; border: 2px solid var(--bg-main);"></span>
    </button>
  </div>

  <div id="menu-grupo-campo">
      <button class="menu-card dark-card" onclick="switchView('view-fiscal')">
        <span class="icon">🛂</span>
        <div class="info">
          <strong>Modo Fiscalização</strong>
          <span>Validar identidades com QR Code</span>
        </div>
      </button>

      <button class="menu-card outline-card" style="border-color: var(--accent); background: rgba(245, 158, 11, 0.05);" onclick="abrirModalEncerrarRota()">
        <span class="icon" style="background: none; filter: none;">🏁</span>
        <div class="info">
          <strong style="color: var(--accent);">Finalizar Viagem (Manual)</strong>
          <span>Limpar lotação de um autocarro</span>
        </div>
      </button>

      <button class="menu-card outline-card" style="border-color: var(--danger); background: rgba(239, 68, 68, 0.1);" onclick="abrirModalSOS()">
        <span class="icon" style="background: var(--danger);">🚨</span>
        <div class="info">
          <strong style="color: var(--danger);">Reportar Avaria (SOS)</strong>
          <span>Aviso urgente à Secretaria e alunos</span>
        </div>
      </button>
  </div>

  <div id="menu-grupo-secretaria" class="hidden">
      <div class="divider-text" style="color: #666; margin-top: 25px;">SECRETARIA E LOGÍSTICA</div>
      
      <button class="menu-card primary-card" onclick="abrirModalSelecaoRota()">
        <span class="icon" style="background: none; filter: none;">🚌</span>
        <div class="info">
          <strong>Fluxo de Rotas (GPS)</strong>
          <span>Assumir Rastreio ou Finalizar Viagem</span>
        </div>
      </button>

      <button class="menu-card outline-card" style="border-color: var(--primary);" onclick="abrirMesaAuditoria()">
        <span class="icon" style="background: none; filter: none;">📂</span>
        <div class="info">
          <strong style="color: var(--primary);">Mesa de Auditoria</strong>
          <span>Validar documentos e gerir matrículas</span>
        </div>
      </button>

      <button class="menu-card outline-card" style="border-color: #3b82f6; background: rgba(59, 130, 246, 0.05);" onclick="abrirModalAvisosFiscal()">
        <span class="icon" style="background: none; filter: none;">📢</span>
        <div class="info">
          <strong style="color: #3b82f6;">Central de Comunicação</strong>
          <span>Disparar avisos Push e Mural</span>
        </div>
      </button>
      
      <button class="menu-card outline-card" onclick="carregarDashboard()">
        <span class="icon" style="background: none; filter: none;">📊</span>
        <div class="info">
          <strong style="color: var(--text-main);">Painel Analítico</strong>
          <span>Estatísticas de uso e BI</span>
        </div>
      </button>
  </div>

  <div id="menu-grupo-moderador" class="hidden">
      <div class="divider-text" style="color: #666; margin-top: 25px;">ADMINISTRAÇÃO DO SISTEMA</div>
      
      <button class="menu-card dark-card" style="border-color: var(--accent);" onclick="abrirPainelModerador()">
        <span class="icon">⚙️</span>
        <div class="info">
          <strong style="color: var(--accent);">Sala das Máquinas</strong>
          <span>CRON, Motores e Gestão de Contas</span>
        </div>
      </button>
  </div>

  <button class="btn-text text-danger" style="margin-top: 20px; font-weight: 700;" onclick="encerrarSessaoOperador()">Sair do Sistema</button>
</section>

<div id="view-painel-motorista" class="view-section" style="display: none;">
  <div class="welcome-text">Central Logística do Motorista</div>

  <button class="menu-card primary-card" onclick="abrirModalSelecaoRota()">
    <div class="icon">🚌</div>
    <div class="info">
      <strong>Fluxo de Rotas</strong>
      <span>Iniciar ou finalizar viagem rastreada</span>
    </div>
  </button>

  <button class="menu-card outline-card text-danger" onclick="abrirModalSOS()">
    <div class="icon">🚨</div>
    <div class="info">
      <strong class="text-danger">SOS Avaria</strong>
      <span>Reportar problemas na frota</span>
    </div>
  </button>

  <button class="menu-card dark-card" onclick="abrirModoFiscalizacaoGlobal()">
    <div class="icon">📷</div>
    <div class="info">
      <strong>Modo Fiscalização</strong>
      <span>Ler QR Code do Estudante</span>
    </div>
  </button>

  <div style="text-align: center; margin-top: 30px; margin-bottom: 20px;">
      <a href="#" onclick="encerrarSessaoOperador()" style="color: var(--danger); font-size: 14px; font-weight: 600; text-decoration: underline;">Sair do Sistema</a>
  </div>
</div>
